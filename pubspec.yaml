name: meshlink
description: A decentralized, offline P2P messaging app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  nearby_connections: ^4.3.0        # Updated to compatible version
  cryptography: ^2.5.0              # X25519 & AES-GCM
  hive: ^2.2.3                      # Fast local storage
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  permission_handler: ^11.0.1       # Critical for Bluetooth/Location
  flutter_sound: ^9.2.13            # Placeholder for voice streaming
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
